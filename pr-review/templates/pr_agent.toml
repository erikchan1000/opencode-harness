# pr_agent.toml — Default configuration for the pr-review skill.
#
# This template is merged with any repo-local .pr_agent.toml overrides.
# The run_review.py wrapper handles the merge and env-var substitution.
#
# LLM model is set via PR_AGENT_MODEL env var at runtime.
# API keys are set via OPENAI_KEY or ANTHROPIC_KEY env vars.

[config]
publish_output = false
# verbosity_level is overridden to 2 at runtime by run_review.py
# so that PR-Agent logs the review YAML to stderr for capture.
verbosity_level = 2
git_provider = "github"

[pr_reviewer]
require_score_review = true
require_tests_review = true
require_security_review = true
require_estimate_effort_to_review = true
num_max_findings = 10
persistent_comment = false
extra_instructions = ""

[pr_code_suggestions]
num_code_suggestions_per_chunk = 4
max_number_of_calls = 3
focus_only_on_problems = true
commitable_code_suggestions = false
suggestions_score_threshold = 0
